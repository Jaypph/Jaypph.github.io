<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>Joke Maker</title>
    <link rel="icon" href="favikon.png" sizes="any">
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
            background-color: #f0f8ff;
        }
        #joke-display {
            font-size: 20px;
            margin: 30px auto;
            padding: 20px;
            width: 60%;
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        button {
            padding: 10px 20px;
            font-size: 18px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <h1>Joke Maker</h1>
    <div id="joke-display">Tryk på 'Ny Joke'</div>
    <button onclick="nyJoke()">Ny Joke</button>
    <a href="index.html" class="button">Tilbage til forsiden</a>
    
    <script>
        // Tilføj eller fjern jokes KUN i denne liste
        const jokes = [
            "Hvorfor kan spøgelser ikke lyve? Fordi man kan se lige igennem dem!",
            "hvad laver edderkoppen når den keder sig? den går på nettet",
            "hvad sagde den ene veg til den anden? vi mødes på hjørnet",
            "hvorfor var jens glad for og bygge et puzzlespil på 6 måneder? fordi der stod 2-4 år",
            "hvorfor går skyen i skole? den skal lære at regne",
            "hvad kalder man et svin der bor på mars? et marssvin",
            "hvorfor er der ingen der vil købe zoo? den er for dyr",
            
        
            // Tilføj flere jokes her som nye strenge, adskilt med komma
        ];

        let visteJokes = [];

        function nyJoke() {
            if (visteJokes.length === jokes.length) {
                visteJokes = []; // Nulstil når alle er vist
            }

            const tilgaengeligeJokes = jokes.filter(joke => !visteJokes.includes(joke));
            const randomIndex = Math.floor(Math.random() * tilgaengeligeJokes.length);
            const valgtJoke = tilgaengeligeJokes[randomIndex];

            visteJokes.push(valgtJoke);
            document.getElementById("joke-display").textContent = valgtJoke;
        }
    </script>
</body>
</html>
