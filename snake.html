<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>VikLin.fun | Slangespil</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; flex-direction: column; }
        canvas { border: 10px solid #34495e; background: #000; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .ui { text-align: center; margin-bottom: 10px; }
        button { padding: 10px 25px; font-size: 18px; cursor: pointer; background: #2ecc71; color: white; border: none; border-radius: 5px; margin-top: 15px; }
        button:hover { background: #27ae60; }
    </style>
    <link rel="icon" href="favikon.png" sizes="any">
<body>
    <a href="index.html" class="button">Tilbage til forsiden</a>
    <div class="ui">
        <h1>Slangespil</h1>
        <div id="score" style="font-size: 24px;">Point: 0</div>
    </div>
    
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <button onclick="startGame()">START SPIL</button>
    <footer>
        <h10>©2026 VIKLIN DIGITAL • DESIGNET TIL FREMTIDEN</h10>
    </footer>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreDisplay = document.getElementById("score");
        
        const box = 20;
        let snake, food, d, score, gameLoop, nextD;

        function init() {
            // Start slangen midt på griddet (skal være deleligt med 'box')
            snake = [{x: 10 * box, y: 10 * box}];
            spawnFood();
            d = null; 
            nextD = null;
            score = 0;
            scoreDisplay.innerHTML = "Point: 0";
        }

        function spawnFood() {
            // Canvas er 400px / 20px (box) = 20 felter.
            // Vi vælger et tal mellem 1 og 18 i stedet for 0 og 19.
            // Formel: Math.floor(Math.random() * (max - min)) + min
            food = {
                x: (Math.floor(Math.random() * 18) + 1) * box,
                y: (Math.floor(Math.random() * 18) + 1) * box
            };
    
            // Tjek om maden lander oven i slangen
            for (let part of snake) {
                if (part.x === food.x && part.y === food.y) spawnFood();
            }
        }


        document.addEventListener("keydown", event => {
            const key = event.keyCode;
            // Forhindre lynhurtige 180-graders vendinger i samme frame
            if (key == 37 && d != "RIGHT") nextD = "LEFT";
            else if (key == 38 && d != "DOWN") nextD = "UP";
            else if (key == 39 && d != "LEFT") nextD = "RIGHT";
            else if (key == 40 && d != "UP") nextD = "DOWN";
        });

        function draw() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Tegn mad
            ctx.fillStyle = "#e74c3c";
            ctx.fillRect(food.x, food.y, box, box);

            // Tegn slange
            for(let i = 0; i < snake.length; i++) {
                ctx.fillStyle = (i == 0) ? "#2ecc71" : "#27ae60";
                ctx.fillRect(snake[i].x, snake[i].y, box, box);
                ctx.strokeStyle = "black";
                ctx.strokeRect(snake[i].x, snake[i].y, box, box);
            }

            if (!nextD) return; // Vent på input
            d = nextD;

            let headX = snake[0].x;
            let headY = snake[0].y;

            if(d == "LEFT") headX -= box;
            if(d == "UP") headY -= box;
            if(d == "RIGHT") headX += box;
            if(d == "DOWN") headY += box;

            // --- RETTET KOLLISION MED MURENE ---
            // Vi tjekker om det NYE hoved vil være uden for canvas-grænserne
            if(headX < 0 || headX >= canvas.width || headY < 0 || headY >= canvas.height || selfCollision({x: headX, y: headY})) {
                clearInterval(gameLoop);
                setTimeout(() => {
                    alert("Spillet er slut! Score: " + score);
                    init();
                    draw();
                }, 10);
                return;
            }

            if(headX == food.x && headY == food.y) {
                score++;
                scoreDisplay.innerHTML = "Point: " + score;
                spawnFood();
            } else {
                snake.pop();
            }

            snake.unshift({x: headX, y: headY});
        }

        function selfCollision(head) {
            for(let part of snake) {
                if(head.x == part.x && head.y == part.y) return true;
            }
            return false;
        }

        function startGame() {
            clearInterval(gameLoop);
            init();
            gameLoop = setInterval(draw, 150); // Rolig hastighed
        }

        init();
        draw();
    </script>
</body>
</html>
