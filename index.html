<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VikLin.fun</title>

<!-- SAME FAVICON AS YOUR ORIGINAL -->
<link rel="icon" href="favikon.png" sizes="any">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root {
    --green1: #008000;
    --green2: #7cfc00;
    --dark: #0f0f0f;
}

body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: linear-gradient(135deg, var(--green1), #111, var(--green1));
    background-size: 400% 400%;
    animation: bg 12s ease infinite;
    color: white;
}

@keyframes bg {
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

/* TOPBAR */
.topbar {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
}

.profile {
    display:flex;
    align-items:center;
    gap:10px;
    cursor:pointer;
}

.profile img {
    width:42px;
    height:42px;
    border-radius:50%;
    border:2px solid var(--green2);
}

/* LOGIN MODAL */
#loginModal {
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.8);
    display:none;
    justify-content:center;
    align-items:center;
}

.modal {
    background:#111;
    padding:20px;
    border-radius:12px;
    width:300px;
}

button {
    width:100%;
    margin-top:10px;
    padding:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.github { background:#333; color:white; }
.email { background:var(--green2); color:black; }
.guest { background:#555; color:white; }

.card {
    background:white;
    color:black;
    margin:10px;
    padding:15px;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="topbar">
    <h2>VikLin.fun</h2>

    <div class="profile" onclick="openLogin()">
        <span id="userLabel">Guest</span>
        <img id="avatar" src="favikon.png">
    </div>
</div>

<!-- LOGIN -->
<div id="loginModal">
    <div class="modal">
        <h3>Log ind</h3>

        <button class="github" onclick="loginGitHub()">GitHub login</button>

        <input id="email" placeholder="Email" style="width:100%;padding:8px;margin-top:10px;">
        <button class="email" onclick="loginEmail()">Email login</button>

        <button class="guest" onclick="closeLogin()">Spil som gæst</button>
    </div>
</div>

<!-- CONTENT -->
<div style="padding:20px;">
    <h1>🎮 Spil</h1>

    <div class="card">Tetris <button onclick="play()">Spil</button></div>
    <div class="card">Snake <button onclick="play()">Spil</button></div>
</div>

<script>
/* =========================
   SUPABASE INIT (FIXED)
========================= */
const supabaseClient = supabase.createClient(
  "https://bmsfrhbmgwqzphszpxwb.supabase.co",
  "sb_publishable_F8_v0IAh3djW12vfau-9iQ_U_On8PKB"
);

/* =========================
   UI
========================= */
function openLogin(){
    document.getElementById("loginModal").style.display="flex";
}

function closeLogin(){
    document.getElementById("loginModal").style.display="none";
}

/* =========================
   AUTH STATE (IMPORTANT FIX)
========================= */
let user = null;

async function loadUser(){
    const { data } = await supabaseClient.auth.getUser();

    if(data.user){
        user = data.user;

        document.getElementById("userLabel").innerText = user.email;

        document.getElementById("avatar").src =
            user.user_metadata?.avatar_url ||
            `https://api.dicebear.com/7.x/identicon/svg?seed=${user.email}`;
    }
}

supabaseClient.auth.onAuthStateChange(() => {
    loadUser();
});

loadUser();

/* =========================
   LOGIN FIXED
========================= */
async function loginGitHub(){
    await supabaseClient.auth.signInWithOAuth({
        provider:"github",
        options:{
            redirectTo: window.location.origin
        }
    });
}

async function loginEmail(){
    const email = document.getElementById("email").value;

    await supabaseClient.auth.signInWithOtp({
        email
    });

    alert("Tjek din email 📩");
    closeLogin();
}

/* =========================
   GAME (guest safe)
========================= */
function play(){
    alert("Spil starter (guest eller login virker)");
}
</script>

</body>
</html>
