<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VikLin.fun</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0a7a2f, #111);
    color: white;
}

/* TOPBAR */
.topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px;
}

.profile {
    display: flex;
    align-items: center;
    gap: 10px;
}

.profile img {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: 2px solid #7cfc00;
    cursor: pointer;
}

/* LOGIN MODAL */
#loginModal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    display: none;
    justify-content: center;
    align-items: center;
}

.modal {
    background: #1a1a1a;
    padding: 20px;
    border-radius: 12px;
    width: 300px;
    text-align: center;
}

button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.github { background: #333; color: white; }
.email { background: #2d7; color: black; }
.guest { background: #555; color: white; }

#content {
    padding: 20px;
}

.card {
    background: white;
    color: black;
    padding: 20px;
    border-radius: 12px;
    margin: 10px 0;
}
</style>
</head>

<body>

<div class="topbar">
    <h2>VikLin.fun</h2>

    <div class="profile">
        <span id="userStatus">Guest</span>
        <img id="avatar" src="https://api.dicebear.com/7.x/identicon/svg?seed=guest"
             onclick="openLogin()">
    </div>
</div>

<!-- LOGIN MODAL -->
<div id="loginModal">
    <div class="modal">
        <h3>Log ind (valgfrit)</h3>

        <button class="github" onclick="loginGitHub()">Login med GitHub</button>

        <input id="emailInput" placeholder="Email" style="width:100%;padding:8px;margin-top:10px;">
        <button class="email" onclick="loginEmail()">Login med Email</button>

        <button class="guest" onclick="closeLogin()">Spil uden login</button>
    </div>
</div>

<!-- CONTENT -->
<div id="content">

    <h1>🎮 Spil Hub</h1>
    <p>Du kan altid spille — login er kun til cloud features.</p>

    <div class="card">
        <h3>Tetris</h3>
        <button onclick="playGame('tetris')">Spil</button>
    </div>

    <div class="card">
        <h3>Snake</h3>
        <button onclick="playGame('snake')">Spil</button>
    </div>

    <div class="card">
        <h3>Math Game</h3>
        <button onclick="playGame('math')">Spil</button>
    </div>

</div>

<script>
/* =========================
   SUPABASE INIT
========================= */
const supabase = supabase.createClient(
  "YOUR_SUPABASE_URL",
  "YOUR_SUPABASE_ANON_KEY"
);

/* =========================
   GUEST SYSTEM (ALTID AKTIV)
========================= */
function getGuestId() {
    let id = localStorage.getItem("viklin_guest");
    if (!id) {
        id = crypto.randomUUID();
        localStorage.setItem("viklin_guest", id);
    }
    return id;
}

/* =========================
   USER STATE
========================= */
let currentUser = null;

async function loadUser() {
    const { data } = await supabase.auth.getUser();

    if (data.user) {
        currentUser = data.user;

        document.getElementById("userStatus").innerText = data.user.email;

        document.getElementById("avatar").src =
            data.user.user_metadata?.avatar_url ||
            `https://api.dicebear.com/7.x/identicon/svg?seed=${data.user.email}`;
    } else {
        currentUser = { type: "guest", id: getGuestId() };
    }
}

loadUser();

/* =========================
   LOGIN UI
========================= */
function openLogin() {
    document.getElementById("loginModal").style.display = "flex";
}

function closeLogin() {
    document.getElementById("loginModal").style.display = "none";
}

/* =========================
   LOGIN METHODS
========================= */
async function loginGitHub() {
    await supabase.auth.signInWithOAuth({
        provider: "github"
    });
}

async function loginEmail() {
    const email = document.getElementById("emailInput").value;

    await supabase.auth.signInWithOtp({
        email: email
    });

    alert("Tjek din email for login-link 🚀");
    closeLogin();
}

/* =========================
   GAME LAUNCH (GUEST SAFE)
========================= */
function playGame(game) {
    alert("Starter: " + game + " (guest eller login virker)");
}

/* =========================
   CLOUD SAVE (READY HOOK)
========================= */
async function saveData(game, data) {
    if (!currentUser || currentUser.type === "guest") {
        localStorage.setItem("save_" + game, JSON.stringify(data));
        return;
    }

    await supabase.from("saves").upsert({
        user_id: currentUser.id,
        game,
        data
    });
}

/* =========================
   LEADERBOARD HOOK
========================= */
async function submitScore(game, score) {
    if (!currentUser || currentUser.type === "guest") return;

    await supabase.from("leaderboard").insert({
        user_id: currentUser.id,
        game,
        score
    });
}
</script>

</body>
</html>
