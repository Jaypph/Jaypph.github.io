<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VikLin.fun | STARTSIDE</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #008000, #1a1a1a);
    color: white;
}

/* TOP BAR */
.topbar {
    display: flex;
    justify-content: space-between;
    padding: 15px;
    align-items: center;
}

.profile {
    position: relative;
    cursor: pointer;
}

.profile img {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: 2px solid #7cfc00;
}

/* LOGIN MODAL */
#loginModal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    display: none;
    justify-content: center;
    align-items: center;
}

.modal-box {
    background: #111;
    padding: 25px;
    border-radius: 15px;
    width: 300px;
    text-align: center;
}

button {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.google { background: #db4437; color: white; }
.microsoft { background: #0078d4; color: white; }
.email { background: #555; color: white; }

.small {
    font-size: 12px;
    opacity: 0.7;
}

.logout, .delete {
    margin-top: 10px;
    background: #222;
    color: white;
}

.delete { background: darkred; }

/* LOCK SCREEN */
.locked {
    display: none;
    text-align: center;
    margin-top: 50px;
}
</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
    <h2>VikLin.fun</h2>

    <div class="profile" onclick="toggleProfileMenu()">
        <img id="profileIcon" src="https://www.gravatar.com/avatar/?d=mp">
    </div>
</div>

<!-- LOCK SCREEN -->
<div class="locked" id="lockedScreen">
    <h2>🔒 Login kræves</h2>
    <button onclick="openLogin()">Log ind</button>
</div>

<!-- LOGIN MODAL -->
<div id="loginModal">
    <div class="modal-box">
        <h3>VikLin Login</h3>

        <button class="google" onclick="login('google')">Google</button>
        <button class="microsoft" onclick="login('microsoft')">Microsoft</button>
        <button class="email" onclick="login('proton')">Proton / Email</button>

        <p class="small">Demo login (localStorage)</p>

        <button onclick="closeLogin()">Luk</button>
    </div>
</div>

<!-- CONTENT -->
<div id="appContent" style="display:none; padding:20px;">
    <h1>Velkommen til VikLin</h1>
    <p>Du er logget ind 🚀</p>

    <button class="logout" onclick="logout()">Log ud</button>
    <button class="delete" onclick="deleteAccount()">Slet konto</button>
</div>

<script>
let user = JSON.parse(localStorage.getItem("viklinUser"));

function updateUI() {
    if(user) {
        document.getElementById("appContent").style.display = "block";
        document.getElementById("lockedScreen").style.display = "none";
        document.getElementById("profileIcon").src =
            `https://api.dicebear.com/7.x/identicon/svg?seed=${user.email}`;
    } else {
        document.getElementById("appContent").style.display = "none";
        document.getElementById("lockedScreen").style.display = "block";
    }
}

function openLogin() {
    document.getElementById("loginModal").style.display = "flex";
}

function closeLogin() {
    document.getElementById("loginModal").style.display = "none";
}

function login(provider) {
    let email = prompt("Indtast email (demo login):");

    if(!email) return;

    user = {
        email: email,
        provider: provider
    };

    localStorage.setItem("viklinUser", JSON.stringify(user));
    closeLogin();
    updateUI();
}

function logout() {
    localStorage.removeItem("viklinUser");
    user = null;
    updateUI();
}

function deleteAccount() {
    if(confirm("Er du sikker på at du vil slette din VikLin konto?")) {
        localStorage.removeItem("viklinUser");
        user = null;
        updateUI();
        alert("Konto slettet.");
    }
}

function toggleProfileMenu() {
    if(!user) openLogin();
}

updateUI();
</script>

</body>
</html>
