<style>
    :root {
        --primary-green: #004d00;
        --accent-green: #7cfc00;
    }

    body {
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: linear-gradient(135deg, #008000, #90ee90, #006400, #1a1a1a);
        background-size: 400% 400%;
        animation: gradientBG 15s ease infinite;
        margin: 0;
        min-height: 100vh;
        color: white;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 20px;
    }

    @keyframes gradientBG {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    .error-container {
        z-index: 2;
        background: rgba(0, 0, 0, 0.3);
        padding: 40px;
        border-radius: 30px;
        backdrop-filter: blur(10px);
        border: 1px solid rgba(124, 252, 0, 0.3);
    }

    h1 { font-size: 5rem; margin: 0; color: var(--accent-green); }
    p { font-size: 1.2rem; margin-bottom: 30px; }

    .back-button {
        display: inline-block;
        padding: 15px 40px;
        background: var(--accent-green);
        color: var(--primary-green);
        text-decoration: none;
        border-radius: 50px;
        font-weight: bold;
        transition: 0.3s;
    }

    .back-button:hover {
        transform: scale(1.05);
        box-shadow: 0 0 20px var(--accent-green);
    }
</style>

<div class="error-container">
    <h1>404</h1>
    <p>Siden findes ikke</p>
    <a href="jaypph.github.io" class="back-button">Tilbage til forsiden</a>
</div>
