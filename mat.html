<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>VikLin.fun | Matematikspillet</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="favikon.png" sizes="any">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #065400;
            color: white;
            text-align: center;
            padding-top: 50px;
            margin: 0;
        }

        .quiz-container {
            background: #334bff;
            padding: 30px;
            border-radius: 20px;
            display: inline-block;
            min-width: 350px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h1 {
            margin-top: 0;
        }

        .stats {
            color: #e0e0e0;
            margin-bottom: 10px;
            font-size: 15px;
        }

        .hint-box {
            background: #2437c9;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            font-size: 1.4em;
            font-weight: bold;
        }

        input {
            padding: 10px;
            font-size: 18px;
            border-radius: 5px;
            border: none;
            width: 200px;
            text-align: center;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            border: none;
            background: #a200ff;
            color: #050505;
            font-weight: bold;
            margin: 10px;
        }

        button:disabled {
            background: #555;
            cursor: not-allowed;
        }

        #resultat {
            font-size: 20px;
            margin-top: 20px;
            font-weight: bold;
            min-height: 30px;
        }

        footer {
            margin-top: 40px;
            font-size: 13px;
            color: #cfcfcf;
        }
    </style>
</head>

<body>
    <a href="index.html" class="button">Tilbage til forsiden</a>
<div class="quiz-container" id="quiz-box">
    <h1>Matematikspillet</h1>

    <div class="stats">
        Opgaver tilbage: <span id="count">10</span> |
        Rigtige: <span id="correct">0</span>
    </div>

    <div id="hint" class="hint-box">Klar?</div>

    <input
        type="number"
        id="answer"
        placeholder="Skriv svaret"
        step="any"
        onkeydown="if(event.key==='Enter' && !this.disabled) check()"
    >
    <br>

    <button id="submit-btn" onclick="check()">Svar</button>
    <button id="next-btn" onclick="nextRound()" style="display:none;">
        Næste spørgsmål ➜
    </button>

    <div id="resultat"></div>
</div>

<footer>
    &copy; 2026 VIKLIN DIGITAL • DESIGNET TIL FREMTIDEN
</footer>

<script>
    // Klassisk spørgsmålsliste – nem at udvide
    const originalList = [
        { n: 25,  h: "5 × 5 =" },
        { n: 200, h: "20 × 10 =" },
        { n: 44,  h: "11 + 11 + 11 + 11 =" },
        { n: 10,  h: "100 ÷ 10 =" },
        { n: 38,  h: "45 − 7 =" },
        { n: 23,  h: "22 + 1 − 8 + 2 + 5 + 1 =" },
        { n: 44,  h: "440 ÷ 10 =" },
        { n: 0,   h: "-8 + 8 =" },
        { n: 0,   h: "π × 0 =" },
        { n: 4,   h: "8 × 0,5 =" }
    ];

    let currentList = [];
    let correctCount = 0;
    let currentItem = null;

    function start() {
        currentList = [...originalList].sort(() => 0.5 - Math.random());
        correctCount = 0;
        document.getElementById("correct").innerText = 0;
        nextRound();
    }

    function nextRound() {
        if (currentList.length === 0) {
            showFinalScore();
            return;
        }

        document.getElementById("resultat").innerText = "";
        document.getElementById("answer").value = "";
        document.getElementById("answer").disabled = false;
        document.getElementById("submit-btn").style.display = "inline-block";
        document.getElementById("next-btn").style.display = "none";

        document.getElementById("count").innerText = currentList.length;

        currentItem = currentList.pop();
        document.getElementById("hint").innerText = currentItem.h;
        document.getElementById("answer").focus();
    }

    function check() {
        const input = document.getElementById("answer");
        const resDiv = document.getElementById("resultat");

        let userGuess = Number(input.value.replace(",", "."));

        if (Number.isNaN(userGuess)) {
            resDiv.innerText = "Det var ikke et tal 🙂";
            resDiv.style.color = "#f1c40f";
            return;
        }

        input.disabled = true;
        document.getElementById("submit-btn").style.display = "none";
        document.getElementById("next-btn").style.display = "inline-block";

        if (userGuess === currentItem.n) {
            correctCount++;
            resDiv.innerText = "Rigtigt! 🎉";
            resDiv.style.color = "#2ecc71";
            document.getElementById("correct").innerText = correctCount;
        } else {
            resDiv.innerText = `Forkert ❌ Det rigtige svar var ${currentItem.n}`;
            resDiv.style.color = "#e74c3c";
        }
    }

    function showFinalScore() {
        const box = document.getElementById("quiz-box");
        box.innerHTML = `
            <h1>Færdig! 🏆</h1>
            <p style="font-size:24px;">
                Du fik <strong>${correctCount}</strong> ud af 10 rigtige
            </p>
            <button onclick="location.reload()">Prøv igen</button>
        `;
    }

    start();
</script>

</body>
</html>
