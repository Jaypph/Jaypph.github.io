<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>VikLin AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f0f0f;
            color: white;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            background: #111;
            padding: 15px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            border-bottom: 1px solid #222;
        }

        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .msg {
            margin: 10px 0;
            padding: 10px;
            border-radius: 10px;
            max-width: 70%;
        }

        .user {
            background: #2b6cff;
            margin-left: auto;
            text-align: right;
        }

        .ai {
            background: #222;
            margin-right: auto;
        }

        #inputBox {
            display: flex;
            padding: 10px;
            background: #111;
            border-top: 1px solid #222;
        }

        input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            outline: none;
        }

        button {
            margin-left: 10px;
            padding: 12px 20px;
            border: none;
            background: #2b6cff;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #1f4fcc;
        }
    </style>
</head>

<body>

<header>
    🤖 VikLin AI
</header>

<div id="chat"></div>

<div id="inputBox">
    <input id="input" placeholder="Skriv til VikLin AI..." />
    <button onclick="send()">Send</button>
</div>

<script>
const API_URL = "https://DIN-RENDER-URL.onrender.com/api/ai"; 
// 🔥 SKIFT DEN HER TIL DIN SERVER

const chat = document.getElementById("chat");
const input = document.getElementById("input");

function addMessage(text, type) {
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

async function send() {
    const message = input.value;
    if (!message) return;

    addMessage(message, "user");
    input.value = "";

    addMessage("Skriver...", "ai");

    try {
        const res = await fetch(API_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ message })
        });

        const data = await res.json();

        // fjern "Skriver..."
        chat.lastChild.remove();

        addMessage(data.response, "ai");

    } catch (err) {
        chat.lastChild.remove();
        addMessage("Fejl i forbindelse til VikLin AI", "ai");
    }
}

input.addEventListener("keypress", function(e) {
    if (e.key === "Enter") send();
});
</script>

</body>
</html>
