<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>VikLin.fun | Shop</title>
    <link rel="icon" href="favikon.png" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="VikLin.fun er en hjemmeside med sjove spil og en shop hvor man kan købe seje ting."> 
    <style>
        :root {
            --primary-green: #004d00;
            --accent-green: #7cfc00;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #008000, #90ee90, #006400, #1a1a1a);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            color: #fff;
        }

        h1 {
            text-align: center;
            margin-bottom: 40px;
        }

        /* Produkter grid */
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); /* sørger for responsive kolonner */
            gap: 30px; /* afstand mellem alle produkter både lodret og vandret */
            justify-items: center;
            padding: 10px; /* lidt luft inde i grid-containeren */
        }

        .product {
            background: rgba(255,255,255,0.9);
            color: var(--primary-green);
            border-radius: 20px;
            padding: 20px;
            width: 220px;
            min-height: 250px; /* sikrer at alle kort har samme højde */
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .product:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }

        .product button {
            margin-top: 10px;
            padding: 10px 15px;
            background: var(--accent-green);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .product button:hover {
            background: var(--primary-green);
        }

        /* Kurv */
        #cart {
            margin-top: 40px;
            background: rgba(0,0,0,0.5);
            padding: 20px;
            border-radius: 20px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        #cart h2 {
            margin-top: 0;
        }

        #cart ul {
            list-style: none;
            padding: 0;
            margin: 10px 0;
        }

        #cart li {
            margin: 5px 0;
        }

        #cart button {
            padding: 10px 15px;
            background: var(--accent-green);
            border: none;
            border-radius: 10px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: background 0.3s;
        }

        #cart button:hover {
            background: var(--primary-green);
        }
    </style>
</head>
<body>
    <a href="index.html" class="button">Tilbage til forsiden</a>
    <h1>Velkommen til VikLin.fun Shop</h1>
    <div class="products">
        <div class="products" id="product-container">
    <!-- Produkterne indlæses herfra serveren -->
            <p>Henter produkter...</p>
        </div>

        </div>
<!-- Cookie politik popup -->
<div id="cookie-banner" style="
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.8);
    color: white;
    padding: 20px;
    border-radius: 15px;
    display: flex;
    flex-direction: column;
    align-items: center;
    max-width: 400px;
    text-align: center;
    z-index: 1000;
">
    <p>Vi bruger cookies til at gemme din kurv. Ved at acceptere, gemmer vi din kurv i browseren.</p>
    <div style="margin-top: 10px; display: flex; gap: 10px;">
        <button id="accept-cookies" style="
            padding: 10px 20px;
            background: #7cfc00;
            border: none;
            border-radius: 10px;
            color: #004d00;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        ">Accepter cookies</button>
        <button id="decline-cookies" style="
            padding: 10px 20px;
            background: red;
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        ">Afvis alle</button>
    </div>
</div>

    <!-- Kurv -->
    <div id="cart">
        <h2>Din kurv</h2>
        <ul id="cart-items"></ul>
        <p>Sum: <span id="total">0</span> DKK eskl. moms</p>
        <button onclick="checkout()">Betal</button>
    </div>
    <footer>
        <div>&copy; 2026 VIKLIN DIGITAL • DESIGNET TIL FREMTIDEN</div>
    </footer>
<script>
const API_URL = "https://jaypph-github-io-js.onrender.com"; // DIN RENDER URL
const VAT = 0.25;
let cart = [];

// 1. Hent produkter fra serveren når siden loader
async function fetchProducts() {
    try {
        const response = await fetch(`${API_URL}/api/products`);
        const produkter = await response.json();
        displayProducts(produkter);
    } catch (error) {
        document.getElementById('product-container').innerHTML = "<p>Kunne ikke hente priser. Prøv igen senere.</p>";
    }
}

// 2. Vis produkterne i din HTML
function displayProducts(produkter) {
    const container = document.getElementById('product-container');
    container.innerHTML = ""; // Tøm "Henter..." besked

    produkter.forEach(p => {
        const div = document.createElement('div');
        div.className = 'product';
        div.innerHTML = `
            <h3>${p.navn}</h3>
            <p>Pris: ${p.pris} DKK</p>
            <button onclick="addToCart('${p.navn}', ${p.pris})">Tilføj til kurv</button>
        `;
        container.appendChild(div);
    });
}

function addToCart(name, price) {
    cart.push({ name, price });
    updateCart();
}

function updateCart() {
    const cartList = document.getElementById("cart-items");
    const totalSpan = document.getElementById("total");
    cartList.innerHTML = "";
    let total = 0;

    cart.forEach((item, index) => {
        total += item.price;
        const li = document.createElement("li");
        li.innerHTML = `${item.name} - ${item.price} DKK <br> 
                        <small>Inkl. moms: ${(item.price * 1.25).toFixed(2)} DKK</small>`;
        cartList.appendChild(li);
    });
    totalSpan.textContent = total.toFixed(2);
}

// Start hentning
fetchProducts();

</script>
</body>
</html>
